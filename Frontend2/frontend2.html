<!DOCTYPE html>
<html>
<head>
    <title>Global Notepad</title>
    <style>
        /* A little CSS to make it look like a notepad */
        textarea { width: 100%; height: 300px; font-size: 16px; padding: 10px; }
        body { max-width: 600px; margin: 40px auto; font-family: sans-serif; }
    </style>
</head>
<body>
    <h1>Anyone-Can-Edit Notepad</h1>
    
    <textarea id="note-box">Loading...</textarea>
    <br>
    <button onclick="saveNote()">Save for Everyone</button>
    <span id="status-text"></span>

    <script>
        const BACKEND_URL = "https://fullstack-test-website-2.onrender.com/api/note"; // <-- Update this!
        const textBox = document.getElementById('note-box');
        const statusText = document.getElementById('status-text');

        // 1. Function to LOAD the note when the page opens
        async function loadNote() {
            const response = await fetch(BACKEND_URL);
            const data = await response.json();
            textBox.value = data.current_note;
        }

        // 2. Function to SAVE the note when the button is clicked
        async function saveNote() {
            statusText.innerText = "Saving...";
            
            await fetch(BACKEND_URL, {
                method: 'POST', // Telling the server we are sending data
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: textBox.value }) // The text to send
            });
            
            statusText.innerText = "Saved!";
            setTimeout(() => statusText.innerText = "", 2000); // Clear message after 2s
        }

        // Run the load function immediately
        loadNote();
    </script>
</body>
</html>
